<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">

  <!-- Fundo -->
  <rect width="512" height="512" fill="#0a0a0a"/>

  <!-- Página do caderno -->
  <rect x="70" y="60" width="372" height="360" rx="18"
        fill="#ffffff" stroke="#1a1a1a" stroke-width="6"/>

  <!-- Linhas do caderno -->
  <g stroke="#d6d6d6" stroke-width="2">
    <line x1="70" y1="120" x2="442" y2="120"/>
    <line x1="70" y1="160" x2="442" y2="160"/>
    <line x1="70" y1="200" x2="442" y2="200"/>
    <line x1="70" y1="240" x2="442" y2="240"/>
    <line x1="70" y1="280" x2="442" y2="280"/>
    <line x1="70" y1="320" x2="442" y2="320"/>
    <line x1="70" y1="360" x2="442" y2="360"/>
  </g>

  <!-- Linha de margem -->
  <line x1="130" y1="60" x2="130" y2="420"
        stroke="#2ecc71" stroke-width="3"/>

  <!-- Letra C -->
  <text
    x="260"
    y="260"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Brush Script MT, Pacifico, cursive"
    font-size="190"
    fill="#22c55e">
    C
  </text>

  <!-- Lápis -->
  <g transform="rotate(-35 400 380)">
    
    <!-- Corpo do lápis -->
    <rect x="320" y="360" width="140" height="22"
          rx="6" fill="#22c55e"/>

    <!-- ponta madeira -->
    <polygon points="460,360 490,371 460,382"
             fill="#d8b48a"/>

    <!-- grafite -->
    <polygon points="490,371 502,371 490,376"
             fill="#1a1a1a"/>

    <!-- borracha -->
    <rect x="300" y="360" width="20" height="22"
          fill="#ffffff"/>

    <!-- metal -->
    <rect x="320" y="360" width="6" height="22"
          fill="#bbbbbb"/>

  </g>

</svg>