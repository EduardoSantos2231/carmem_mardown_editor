name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: host-uk/build@v4.0.0
        with:
          build-name: carmem
          build-platform: linux/amd64
          package: true
